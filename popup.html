<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotesJet Manager</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/all.min.css" />
  </head>
  <body class="light-theme">
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1 class="app-logo">NotesJet</h1>
          <div class="sidebar-header-actions">
            <button id="add-notebook-btn" class="add-notebook-btn" title="Add New Notebook"><i class="fa-solid fa-plus"></i></button>
            <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" title="Collapse sidebar"><i class="fa-solid fa-angles-left"></i></button>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section-title">NOTEBOOKS</div>
          <div id="sidebar-notebooks" class="sidebar-notebooks-list">
            <!-- Dynamically populated -->
          </div>
        </nav>

        <div class="sidebar-footer">
          <button id="theme-toggle" class="sidebar-action-btn"><i class="fa-solid fa-moon"></i> Dark Mode</button>
          <div class="backup-actions">
            <button id="export-data-btn" class="sidebar-action-btn-small" title="Export Notes to JSON"><i class="fa-solid fa-file-export"></i> Export</button>
            <button id="import-data-btn" class="sidebar-action-btn-small" title="Import Notes from JSON"><i class="fa-solid fa-file-import"></i> Import</button>
            <input type="file" id="import-file-input" accept=".json" style="display: none;" />
          </div>
        </div>
      </aside>

      <!-- Main Work Area -->
      <main class="main-content">
        <div id="active-notebook-container" class="active-notebook-container">
          <!-- Dynamically populated active notebook and notes grid -->
        </div>
      </main>
    </div>

    <!-- Create Notebook Modal -->
    <div class="modal-overlay-custom" id="create-notebook-modal" style="display: none">
      <div class="modal-content-custom">
        <h3>New Notebook</h3>
        <p>Create a category to group your notes.</p>
        <input type="text" id="new-notebook-name" placeholder="e.g. 💡 Ideas, 📝 Drafts..." class="modal-input" maxlength="25" />
        <div class="modal-actions-custom">
          <button class="modal-btn-custom modal-cancel-btn">Cancel</button>
          <button class="modal-btn-custom modal-confirm-btn" id="confirm-create-notebook-btn">Create</button>
        </div>
      </div>
    </div>

    <!-- Delete Notebook Modal -->
    <div class="modal-overlay-custom" id="delete-notebook-modal" style="display: none">
      <div class="modal-content-custom modal-danger">
        <h3>Delete Notebook?</h3>
        <p>Are you sure you want to delete this notebook and all its notes? This action cannot be undone.</p>
        <div class="modal-actions-custom">
          <button class="modal-btn-custom modal-cancel-btn">Cancel</button>
          <button class="modal-btn-custom modal-delete-btn" id="confirm-delete-notebook-btn">Delete</button>
        </div>
      </div>
    </div>

    <!-- Note Editor Modal Overlay (Slide-up Panel) -->
    <div class="editor-overlay" id="note-editor-overlay" style="display: none">
      <div class="editor-panel">
        <div class="editor-header">
          <div class="editor-actions-left">
            <button id="editor-close-btn" class="editor-header-btn" title="Close editor"><i class="fa-solid fa-xmark"></i> Close</button>
            <button id="editor-archive-btn" class="editor-header-btn" title="Archive note"><i class="fa-solid fa-box-archive"></i> Archive</button>
          </div>
          <div class="editor-actions-right">
            <button id="editor-delete-btn" class="editor-header-btn danger" title="Delete note"><i class="fa-solid fa-trash-can"></i> Delete</button>
            <button id="editor-save-btn" class="editor-header-btn primary" title="Save changes"><i class="fa-solid fa-floppy-disk"></i> Save Note</button>
          </div>
        </div>

        <div class="editor-body">
          <div class="editor-title-row">
            <input type="text" id="editor-note-title" placeholder="Note Title" class="editor-title-input" />
            <div class="editor-color-selector">
              <div class="custom-dropdown-container">
                <button type="button" id="editor-note-color-trigger" class="color-trigger-btn" title="Choose note color"></button>
                <div id="editor-note-color-dropdown" class="custom-color-dropdown-panel" style="display: none;">
                  <div class="color-grid-panel">
                    <button type="button" class="color-option-dot bg-dot-emerald" data-color="emerald" title="emerald"></button>
                    <button type="button" class="color-option-dot bg-dot-lavender" data-color="lavender" title="lavender"></button>
                    <button type="button" class="color-option-dot bg-dot-ocean" data-color="ocean" title="ocean"></button>
                    <button type="button" class="color-option-dot bg-dot-sunset" data-color="sunset" title="sunset"></button>
                    <button type="button" class="color-option-dot bg-dot-rose" data-color="rose" title="rose"></button>
                    <button type="button" class="color-option-dot bg-dot-crimson" data-color="crimson" title="crimson"></button>
                    <button type="button" class="color-option-dot bg-dot-clay" data-color="clay" title="clay"></button>
                    <button type="button" class="color-option-dot bg-dot-charcoal" data-color="charcoal" title="charcoal"></button>
                    <button type="button" class="color-option-dot bg-dot-amber" data-color="amber" title="amber"></button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <textarea id="editor-note-content" placeholder="Start typing your note details here..." class="editor-textarea"></textarea>
        </div>

        <div class="editor-footer">
          <span id="editor-last-modified" class="editor-meta">Last modified: Just now</span>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="utils/jquery.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
